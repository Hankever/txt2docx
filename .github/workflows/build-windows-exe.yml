name: build-windows-exe

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install WiX
        run: choco install wixtoolset --no-progress -y

      - name: Show tool versions
        shell: pwsh
        run: |
          java -version
          mvn -version
          jpackage --version

      - name: Build fat jar
        run: mvn -B clean package

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path target/txt2docx.jar)) {
            Write-Error "target/txt2docx.jar was not created"
          }
          Get-ChildItem target

      - name: Create EXE installer
        shell: cmd
        run: scripts\package-windows.bat

      - name: Verify installer output
        shell: pwsh
        run: |
          if (-not (Get-ChildItem dist/windows/*.exe -ErrorAction SilentlyContinue)) {
            Write-Error "No EXE installer was generated"
          }
          Get-ChildItem dist/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: txt2docx-windows-exe
          path: dist/windows/*.exe

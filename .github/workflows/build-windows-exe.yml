name: build-windows-exe

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install WiX
        run: choco install wixtoolset --no-progress -y

      - name: Show tool versions
        shell: pwsh
        run: |
          java -version
          mvn -version
          jpackage --version

      - name: Build fat jar
        run: mvn -B clean package

      - name: Prepare Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64)) {
            Write-Host "Windows signing certificate import skipped: WINDOWS_CERTIFICATE_PFX_BASE64 is not set"
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          "WINDOWS_CERTIFICATE_PATH=$certificatePath" >> $env:GITHUB_ENV

      - name: Locate signtool
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($signtool) {
            "SIGNTOOL_PATH=$($signtool.FullName)" >> $env:GITHUB_ENV
          } else {
            Write-Host "signtool.exe was not found; unsigned packaging still works."
          }

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path target/txt2docx.jar)) {
            Write-Error "target/txt2docx.jar was not created"
          }
          Get-ChildItem target

      - name: Create EXE installer
        shell: cmd
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: scripts\package-windows.bat

      - name: Verify installer output
        shell: pwsh
        run: |
          if (-not (Get-ChildItem dist/windows/*.exe -ErrorAction SilentlyContinue)) {
            Write-Error "No EXE installer was generated"
          }
          Get-ChildItem dist/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: txt2docx-windows-exe
          path: dist/windows/*.exe
